<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — GST Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0eeea;color:#1a1a1a;}
.topbar{background:white;border-bottom:2px solid #e0ddd5;padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.logo-box{width:36px;height:36px;background:linear-gradient(135deg,#ea580c,#f97316);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-title span{color:#f97316;}
.nav-links{display:flex;gap:6px;}
.nav-link{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;color:#555;transition:all 0.2s;}
.nav-link:hover{background:#f5f3ef;color:#1a1a1a;}
.nav-link.active{background:#fff8f3;color:#f97316;}
.btn-logout{padding:6px 14px;border:1.5px solid #e0ddd5;border-radius:6px;background:white;font-size:12px;cursor:pointer;color:#555;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-logout:hover{border-color:#c0392b;color:#c0392b;}
.content{max-width:1000px;margin:0 auto;padding:28px 24px;}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:white;border:1.5px solid #e0ddd5;border-radius:10px;padding:4px;}
.tab{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;transition:all 0.18s;font-family:'Plus Jakarta Sans',sans-serif;color:#666;}
.tab.active{background:#f97316;color:white;}
.panel{display:none;} .panel.active{display:block;}
.card{background:white;border:1.5px solid #e0ddd5;border-radius:12px;overflow:hidden;margin-bottom:20px;}
.card-head{background:linear-gradient(135deg,#f8f4ec,#f2ede0);padding:14px 20px;border-bottom:1px solid #e0ddd5;display:flex;align-items:center;justify-content:space-between;}
.card-head h3{font-size:13px;font-weight:700;color:#8B7325;letter-spacing:1.5px;text-transform:uppercase;}
.btn-add{padding:7px 16px;background:#f97316;border:none;border-radius:7px;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-add:hover{background:#ea580c;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#faf7f0;padding:9px 16px;text-align:left;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:#8B7325;border-bottom:1.5px solid #e0ddd5;}
td{padding:10px 16px;border-bottom:1px solid #f5f2ec;color:#444;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fffbf5;}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;text-transform:uppercase;}
.badge-admin{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.3);color:#f97316;}
.badge-user{background:rgba(71,85,105,0.08);border:1px solid #ddd;color:#666;}
.btn-del{padding:4px 10px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.25);border-radius:5px;color:#c0392b;font-size:11px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-del:hover{background:#c0392b;color:white;}
.btn-pw{padding:4px 10px;background:rgba(37,99,235,0.08);border:1px solid rgba(37,99,235,0.25);border-radius:5px;color:#2563eb;font-size:11px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-right:4px;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;}
.modal-bg.open{display:flex;}
.modal{background:white;border-radius:12px;padding:28px;width:100%;max-width:420px;box-shadow:0 16px 48px rgba(0,0,0,0.15);}
.modal h3{font-size:16px;font-weight:800;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px;}
.form-group input,.form-group select{width:100%;padding:9px 12px;border:1.5px solid #e0ddd5;border-radius:7px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;}
.form-group input:focus,.form-group select:focus{border-color:#f97316;}
.modal-btns{display:flex;gap:8px;margin-top:20px;}
.btn-save{flex:1;padding:10px;background:#f97316;border:none;border-radius:7px;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-cancel{flex:1;padding:10px;background:#f5f3ef;border:1.5px solid #e0ddd5;border-radius:7px;color:#555;font-size:13px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.history-table td:nth-child(4){font-family:'IBM Plex Mono',monospace;font-size:11px;}
.status-ok{color:#27ae60;font-weight:600;} .status-err{color:#c0392b;font-weight:600;}
.toast{position:fixed;bottom:20px;right:20px;min-width:240px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;transform:translateY(70px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.4,0.64,1);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.s{background:#f0fff6;border:1.5px solid rgba(39,174,96,0.4);color:#15803d;}
.toast.e{background:#fff5f5;border:1.5px solid rgba(192,57,43,0.4);color:#c0392b;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-box">TAX</div>
    <div class="topbar-title">GST Portal — <span>Admin Panel</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="nav-links">
      <a href="/" class="nav-link">← Back to Portal</a>
    </div>
    <button class="btn-logout" onclick="window.location='/logout'">Logout</button>
  </div>
</div>

<div class="content">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('users')">👥 Users</button>
    <button class="tab" onclick="switchTab('hotels')">🏨 Hotels</button>
    <button class="tab" onclick="switchTab('history')">📋 History</button>
  </div>

  <!-- USERS -->
  <div class="panel active" id="panel-users">
    <div class="card">
      <div class="card-head">
        <h3>User Management</h3>
        <button class="btn-add" onclick="openModal('user')">+ Add User</button>
      </div>
      <table>
        <thead><tr><th>Username</th><th>Full Name</th><th>Role</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody id="users-tbody"><tr><td colspan="5" style="text-align:center;color:#aaa;padding:20px">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- HOTELS -->
  <div class="panel" id="panel-hotels">
    <div class="card">
      <div class="card-head">
        <h3>Hotel Management</h3>
        <button class="btn-add" onclick="openModal('hotel')">+ Add Hotel</button>
      </div>
      <table>
        <thead><tr><th>Code</th><th>Hotel Name</th><th>GSTIN</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody id="hotels-tbody"><tr><td colspan="5" style="text-align:center;color:#aaa;padding:20px">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-history">
    <div class="card">
      <div class="card-head"><h3>Processing History</h3></div>
      <table class="history-table">
        <thead><tr><th>User</th><th>Hotel</th><th>Module</th><th>Step</th><th>File</th><th>Status</th><th>Time</th></tr></thead>
        <tbody id="history-tbody"><tr><td colspan="7" style="text-align:center;color:#aaa;padding:20px">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- User Modal -->
<div class="modal-bg" id="modal-user">
  <div class="modal">
    <h3>Add New User</h3>
    <div class="form-group"><label>Username</label><input type="text" id="new-username" placeholder="e.g. rahul_sharma"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="new-fullname" placeholder="Rahul Sharma"></div>
    <div class="form-group"><label>Password</label><input type="password" id="new-password" placeholder="Min 6 characters"></div>
    <div class="form-group"><label>Role</label>
      <select id="new-role"><option value="user">User</option><option value="admin">Admin</option></select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('user')">Cancel</button>
      <button class="btn-save" onclick="saveUser()">Create User</button>
    </div>
  </div>
</div>

<!-- Hotel Modal -->
<div class="modal-bg" id="modal-hotel">
  <div class="modal">
    <h3>Add New Hotel</h3>
    <div class="form-group"><label>Hotel Code</label><input type="text" id="new-hotel-code" placeholder="e.g. JMH" style="text-transform:uppercase"></div>
    <div class="form-group"><label>Hotel Name</label><input type="text" id="new-hotel-name" placeholder="Jaipur Marriott Hotel"></div>
    <div class="form-group"><label>GSTIN</label><input type="text" id="new-hotel-gstin" placeholder="GSTIN Number"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('hotel')">Cancel</button>
      <button class="btn-save" onclick="saveHotel()">Create Hotel</button>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div class="modal-bg" id="modal-pw">
  <div class="modal">
    <h3>Change Password</h3>
    <input type="hidden" id="pw-uid">
    <div class="form-group"><label>New Password</label><input type="password" id="new-pw" placeholder="New password"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('pw')">Cancel</button>
      <button class="btn-save" onclick="savePassword()">Update Password</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='users') loadUsers();
  if(tab==='hotels') loadHotels();
  if(tab==='history') loadHistory();
}

function openModal(type) {
  document.getElementById('modal-'+type).classList.add('open');
}
function closeModal(type) {
  document.getElementById('modal-'+type).classList.remove('open');
}

async function loadUsers() {
  const res = await fetch('/api/admin/users');
  const users = await res.json();
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><strong>${u.username}</strong></td>
      <td>${u.full_name || '—'}</td>
      <td><span class="badge ${u.role==='admin'?'badge-admin':'badge-user'}">${u.role}</span></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${u.created_at?.slice(0,10) || '—'}</td>
      <td>
        <button class="btn-pw" onclick="openPwModal(${u.id})">Change PW</button>
        ${u.username!=='admin'?`<button class="btn-del" onclick="deleteUser(${u.id},'${u.username}')">Delete</button>`:''}
      </td>
    </tr>
  `).join('');
}

async function loadHotels() {
  const res = await fetch('/api/admin/hotels');
  const hotels = await res.json();
  const tbody = document.getElementById('hotels-tbody');
  tbody.innerHTML = hotels.map(h => `
    <tr>
      <td><strong style="font-family:'IBM Plex Mono',monospace">${h.code}</strong></td>
      <td>${h.name}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${h.gstin || '—'}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${h.created_at?.slice(0,10) || '—'}</td>
      <td><button class="btn-del" onclick="deleteHotel(${h.id},'${h.name}')">Delete</button></td>
    </tr>
  `).join('');
}

async function loadHistory() {
  const res = await fetch('/api/history');
  const rows = await res.json();
  const tbody = document.getElementById('history-tbody');
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.full_name || r.username}</td>
      <td>${r.hotel_name || '—'}</td>
      <td><span class="badge badge-user">${r.module}</span></td>
      <td>${r.step}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${r.filename}</td>
      <td><span class="${r.status==='success'?'status-ok':'status-err'}">${r.status}</span></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${r.processed_at?.slice(0,16) || '—'}</td>
    </tr>
  `).join('') || '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:20px">No history yet</td></tr>';
}

async function saveUser() {
  const data = {
    username:  document.getElementById('new-username').value.trim(),
    full_name: document.getElementById('new-fullname').value.trim(),
    password:  document.getElementById('new-password').value.trim(),
    role:      document.getElementById('new-role').value,
  };
  if(!data.username || !data.password) { toast('Fill all required fields','e'); return; }
  const res = await fetch('/api/admin/users', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  const d = await res.json();
  if(res.ok) { closeModal('user'); loadUsers(); toast('User created!','s'); }
  else toast(d.error,'e');
}

async function saveHotel() {
  const data = {
    code:  document.getElementById('new-hotel-code').value.trim().toUpperCase(),
    name:  document.getElementById('new-hotel-name').value.trim(),
    gstin: document.getElementById('new-hotel-gstin').value.trim(),
  };
  if(!data.code || !data.name) { toast('Fill all required fields','e'); return; }
  const res = await fetch('/api/admin/hotels', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  const d = await res.json();
  if(res.ok) { closeModal('hotel'); loadHotels(); toast('Hotel created!','s'); }
  else toast(d.error,'e');
}

function openPwModal(uid) {
  document.getElementById('pw-uid').value = uid;
  document.getElementById('new-pw').value = '';
  document.getElementById('modal-pw').classList.add('open');
}
async function savePassword() {
  const uid = document.getElementById('pw-uid').value;
  const pw  = document.getElementById('new-pw').value.trim();
  if(!pw) { toast('Enter new password','e'); return; }
  const res = await fetch(`/api/admin/users/${uid}/password`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(res.ok) { closeModal('pw'); toast('Password updated!','s'); }
}

async function deleteUser(uid, name) {
  if(!confirm(`Delete user "${name}"?`)) return;
  const res = await fetch(`/api/admin/users/${uid}`, {method:'DELETE'});
  if(res.ok) { loadUsers(); toast('User deleted','s'); }
}

async function deleteHotel(hid, name) {
  if(!confirm(`Delete hotel "${name}"?`)) return;
  const res = await fetch(`/api/admin/hotels/${hid}`, {method:'DELETE'});
  if(res.ok) { loadHotels(); toast('Hotel deleted','s'); }
}

function toast(msg, type='s') {
  const t = document.getElementById('toast');
  t.textContent = (type==='s'?'✓  ':'✕  ') + msg;
  t.className = 'toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// Load on start
loadUsers();
</script>
</body>
</html>
